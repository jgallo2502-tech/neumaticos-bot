<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumáticos Gallo — Presupuestos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 {
      color: #1a1a2e;
      font-size: 22px;
      font-weight: 700;
    }
    .logo p {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }
    .logo-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #e63946;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #e63946;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #c1121f; }
    .error {
      background: #fee;
      color: #c1121f;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔴</div>
      <h1>Neumáticos Gallo</h1>
      <p>Sistema de Presupuestos</p>
    </div>
    <div class="error" id="error">Usuario o contraseña incorrectos</div>
    <label>Usuario</label>
    <input type="text" id="usuario" placeholder="tu usuario" autocomplete="username">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button onclick="login()">Ingresar</button>
  </div>

  <script>
    async function login() {
      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';

      const res = await fetch('/app/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, password })
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('vendedor', data.nombre);
        window.location.href = '/app/dashboard.html';
      } else {
        errorEl.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
